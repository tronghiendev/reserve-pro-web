<body class="bg-background min-h-screen flex items-center justify-center p-md">
<!-- Login Container -->
<main class="w-full max-w-[400px] bg-surface-container-lowest rounded-lg border border-surface-variant shadow-sm p-xl flex flex-col gap-xl">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="h-12 w-12 bg-primary-container text-on-primary-container rounded-lg flex items-center justify-center mb-base">
<span class="material-symbols-outlined text-[28px]" data-icon="corporate_fare" data-weight="fill" style="font-variation-settings: 'FILL' 1;">corporate_fare</span>
</div>
<h1 class="font-h3 text-h3 text-on-surface m-0 p-0">System Sign In</h1>
<p class="font-body-md text-body-md text-on-surface-variant m-0 p-0">Secure Access Portal</p>
</header>
<!-- Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Input Group: Username -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface m-0 p-0" for="username">Username or Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="person">person</span>
<input class="w-full h-11 pl-xxl pr-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="username" name="username" placeholder="Enter your credentials" type="text">
</div>
</div>
<!-- Input Group: Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface m-0 p-0" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="lock">lock</span>
<input class="w-full h-11 pl-xxl pr-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" name="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Action -->
<div class="flex flex-col items-center gap-md mt-sm">
<button class="w-full h-11 bg-primary text-on-primary font-label-md text-label-md rounded hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center" type="button">
                    Login
                </button>
<a class="font-body-md text-body-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
</form>
</main>
