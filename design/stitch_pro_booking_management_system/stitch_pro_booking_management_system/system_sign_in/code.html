<body class="bg-[#f0f2f5] min-h-screen flex items-center justify-center font-body-md text-on-surface p-md">
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-lg border border-[#d9d9d9] shadow-[0_3px_6px_-4px_rgba(0,0,0,.12),_0_6px_16px_0_rgba(0,0,0,.08)] p-lg flex flex-col gap-xl">
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]" data-icon="domain" data-weight="fill">domain</span>

<div>
<h1 class="font-h3 text-h3 text-on-surface">System Sign In</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Secure Access Portal</p>
</div>
</div>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="username">Username / Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="person">person</span>
<input class="w-full h-[40px] pl-[36px] pr-sm border border-[#d9d9d9] rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-outline-variant" id="username" placeholder="Enter your credentials" type="text">
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-sm text-outline" data-icon="lock">lock</span>
<input class="w-full h-[40px] pl-[36px] pr-sm border border-[#d9d9d9] rounded bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="Enter your password" type="password">
</div>
<div class="flex justify-end mt-xs">
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<button class="w-full h-[40px] bg-primary text-on-primary font-label-md text-label-md rounded flex items-center justify-center gap-xs hover:bg-surface-tint transition-colors mt-sm shadow-sm active:scale-[0.98]" type="button">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="text-center pt-md border-t border-outline-variant">
<p class="font-body-sm text-body-sm text-on-surface-variant">Protected by Enterprise Grade Security</p>
</div>
</div>
