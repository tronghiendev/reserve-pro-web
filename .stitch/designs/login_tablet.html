<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .ant-shadow {
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>

<body class="bg-background min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Login Container -->
<main class="w-full max-w-[400px] flex flex-col items-center">
<!-- Logo and Branding -->
<div class="mb-lg flex flex-col items-center">
<div class="w-16 h-16 mb-md overflow-hidden flex items-center justify-center">
<img alt="ReservePro Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujhabrb7iQs_zKmqdGnXqNu2KtsSio0Bp9-_t_e9_z3fd_UHw-NMVk0N_T-Rdaa9QVs3FJ1hjfaR7f0ungNj-fUJEFVhweP3a_i_41J0pqpwVymJVeFnwrJlxCBrxGLoc5iG-xc9iu0cDStnSoMP0fRtRl9L5GDL1fwonXUf4zEfHHSq0lskiOApe98F0f_W1jgslejckscTylRFANXOIdcyvrV3lyyoUTRQoC31XbuClkrjJyO-sv2OA"/>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">ReservePro</h1>
<p class="font-label-md text-label-md text-on-surface-variant opacity-70">Administrative Management Portal</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest border border-border-light rounded-lg ant-shadow p-xl">
<h2 class="font-headline-sm text-headline-sm text-center text-on-surface mb-lg">Sign In</h2>
<form class="space-y-lg" id="loginForm">
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-10 pr-md py-[9px] bg-surface-container-lowest border border-input-border rounded-[6px] font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline-variant" id="email" placeholder="admin@reserve-pro.test" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px] group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-10 pr-10 py-[9px] bg-surface-container-lowest border border-input-border rounded-[6px] font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline-variant" id="password" placeholder="Enter password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<label class="flex items-center cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-4 w-4 rounded border-input-border text-primary focus:ring-primary/20 transition-all" type="checkbox"/>
</div>
<span class="ml-2 font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface">Remember me</span>
</label>
<a class="font-body-md text-body-md text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full h-10 bg-primary text-white font-label-md text-label-md rounded-[6px] hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Social Login / SSO Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-light"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-md bg-surface-container-lowest text-outline-variant font-label-sm">Or continue with SSO</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center py-sm px-md border border-input-border rounded-[6px] font-body-md text-body-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-2 text-[18px]">account_circle</span>
                    Google
                </button>
<button class="flex items-center justify-center py-sm px-md border border-input-border rounded-[6px] font-body-md text-body-md hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined mr-2 text-[18px]">domain</span>
                    Azure AD
                </button>
</div>
</div>
<!-- Credentials Helper -->
<div class="mt-lg text-center bg-surface-container-low rounded-lg py-sm px-lg border border-border-light border-dashed">
<p class="font-label-sm text-label-sm text-slate-text flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px]">info</span>
                admin@reserve-pro.test / password
            </p>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 w-full bg-background border-t border-surface-variant py-md px-lg">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-sm">
<p class="font-label-sm text-label-sm text-on-surface-variant">© 2024 ReservePro Enterprise. All rights reserved.</p>
<div class="flex gap-lg">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors underline" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors underline" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors underline" href="#">Security</a>
</div>
</div>
</footer>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing In...';
            btn.disabled = true;
            
            // Artificial delay for feedback
            setTimeout(() => {
                alert('Authentication successful. Redirecting to dashboard...');
                btn.innerHTML = 'Redirecting...';
            }, 1200);
        });

        // Micro-interaction for password toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            toggleBtn.children[0].textContent = isPass ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
