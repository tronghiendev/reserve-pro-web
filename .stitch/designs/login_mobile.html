<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs text-center">
                Sign in to ReservePro
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">
                Mini Booking Management Console
            </p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest rounded-ant-card border border-ant-border shadow-ant p-lg flex flex-col">
<form action="#" class="flex flex-col gap-lg" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">
                        Email
                    </label>
<div class="relative">
<input class="w-full h-[40px] px-sm border border-ant-border-input rounded-ant font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20" id="email" name="email" placeholder="admin@reserve-pro.test" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">
                        Password
                    </label>
<div class="relative">
<input class="w-full h-[40px] px-sm border border-ant-border-input rounded-ant font-body-md text-body-md text-on-surface placeholder:text-outline transition-all duration-200 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 pr-10" id="password" name="password" placeholder="Enter password" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Controls -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-xs">
<input class="w-[16px] h-[16px] rounded border-ant-border-input text-primary focus:ring-primary focus:ring-offset-0 transition-all duration-200 cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface cursor-pointer" for="remember">
                            Remember me
                        </label>
</div>
<a class="font-body-md text-body-md text-primary hover:text-primary-container transition-colors" href="#">
                        Forgot password?
                    </a>
</div>
<!-- Submit Button -->
<button class="w-full h-[40px] bg-primary hover:bg-surface-tint text-on-primary font-label-md text-label-md rounded-ant transition-all duration-200 flex items-center justify-center shadow-sm" type="submit">
                    Sign In
                </button>
</form>
